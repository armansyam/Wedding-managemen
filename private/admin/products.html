<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Produk — Vendor Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="page-header">
      <h1>📦 Master Produk (Modal)</h1>
      <div class="btn-group">
        <select id="filter-cat" onchange="window.load()" style="padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px">
          <option value="">Semua</option>
          <option value="fisik">📦 Fisik</option>
          <option value="digital">💻 Digital</option>
        </select>
        <button class="btn btn-primary" onclick="openModal('modal-add')">+ Tambah Produk</button>
      </div>
    </div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Barang/jasa dengan modal FIX yang masuk ke paket. Harga = unit_cost × quantity.</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nama</th><th>Kategori</th><th>Harga/Unit</th><th>Satuan</th><th>Deskripsi</th><th>Aksi</th></tr></thead>
        <tbody id="products-table"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modal-add">
    <div class="modal" style="max-width:420px">
      <h2>Tambah Produk</h2>
      <div class="form-group"><label>Nama *</label><input type="text" id="f-name"></div>
      <div class="form-group"><label>Kategori *</label>
        <select id="f-cat"><option value="fisik">📦 Fisik</option><option value="digital">💻 Digital</option></select>
      </div>
      <div class="form-group"><label>Harga per Unit (Rp)</label><input type="number" id="f-cost" value="0"></div>
      <div class="form-group"><label>Satuan</label><input type="text" id="f-unit" placeholder="pcs, lembar, hari, sesi"></div>
      <div class="form-group"><label>Deskripsi</label><input type="text" id="f-desc"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('modal-add')">Batal</button>
        <button class="btn btn-primary" onclick="window.save()">Simpan</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-edit">
    <div class="modal" style="max-width:420px">
      <h2>Edit Produk</h2>
      <input type="hidden" id="e-id">
      <div class="form-group"><label>Nama</label><input type="text" id="e-name"></div>
      <div class="form-group"><label>Kategori</label>
        <select id="e-cat"><option value="fisik">📦 Fisik</option><option value="digital">💻 Digital</option></select>
      </div>
      <div class="form-group"><label>Harga/Unit</label><input type="number" id="e-cost"></div>
      <div class="form-group"><label>Satuan</label><input type="text" id="e-unit"></div>
      <div class="form-group"><label>Deskripsi</label><input type="text" id="e-desc"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('modal-edit')">Batal</button>
        <button class="btn btn-primary" onclick="window.update()">Simpan</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {

    renderSidebar('products');
    load();
    });

    async function load() {
    const cat = document.getElementById('filter-cat').value;
    let url = '/api/products';
    if (cat) url += `?category=${cat}`;
    const list = await API.get(url);
    document.getElementById('products-table').innerHTML = list.length
    ? list.map(p => `<tr>
    <td><strong>${p.name}</strong></td>
    <td>${p.category === 'fisik' ? '📦 Fisik' : '💻 Digital'}</td>
    <td>${formatIDR(p.unit_cost)}</td><td>${p.unit}</td><td>${p.description || '-'}</td>
    <td><div class="btn-group">
    <button class="btn btn-sm btn-secondary" onclick="window.editProduct(${p.id},'${p.name.replace(/'/g,"\\'")}','${p.category}',${p.unit_cost},'${p.unit}','${(p.description||'').replace(/'/g,"\\'")}')">Edit</button>
    <button class="btn btn-sm btn-danger" onclick="window.deactivate(${p.id})">Hapus</button>
    </div></td>
    </tr>`).join('')
    : '<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:30px">Belum ada produk</td></tr>';
    }
    async function save() {
    const data = { name: document.getElementById('f-name').value, category: document.getElementById('f-cat').value, unit_cost: parseInt(document.getElementById('f-cost').value)||0, unit: document.getElementById('f-unit').value, description: document.getElementById('f-desc').value };
    if (!data.name) return alert('Nama wajib diisi');
    await API.post('/api/products', data);
    closeModal('modal-add'); load();
    }
    function editProduct(id, name, cat, cost, unit, desc) {
    document.getElementById('e-id').value = id;
    document.getElementById('e-name').value = name;
    document.getElementById('e-cat').value = cat;
    document.getElementById('e-cost').value = cost;
    document.getElementById('e-unit').value = unit;
    document.getElementById('e-desc').value = desc;
    openModal('modal-edit');
    }
    async function update() {
    await API.put(`/api/products/${document.getElementById('e-id').value}`, {
    name: document.getElementById('e-name').value, category: document.getElementById('e-cat').value,
    unit_cost: parseInt(document.getElementById('e-cost').value)||0, unit: document.getElementById('e-unit').value,
    description: document.getElementById('e-desc').value,
    });
    closeModal('modal-edit'); load();
    }
    async function deactivate(id) {
    if (!confirm('Hapus produk ini?')) return;
    await API.del(`/api/products/${id}`);
    load();
    }

  </script>
</body>
</html>
