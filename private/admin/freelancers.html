<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Freelance — Vendor Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/admin.css">
  <style>
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .stat-card .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 20px; font-weight: 800; }
    .fee-pill { display: inline-block; font-size: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; color: var(--text2); margin: 1px 2px; cursor: pointer; white-space: nowrap; }
    .fee-pill:hover { border-color: var(--accent); color: var(--text); }
    .phone-link { color: var(--blue); text-decoration: none; cursor: pointer; }
    .phone-link:hover { text-decoration: underline; }
    .btn-icon { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .btn-icon:hover { background: var(--surface); border-color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--red); background: rgba(220,38,38,0.1); }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="page-header">
      <h1>👥 Freelance</h1>
      <div class="btn-group">
        <div class="search-bar"><input type="text" placeholder="Cari nama..." id="search" oninput="window.load()"></div>
        <button class="btn btn-primary" onclick="openModal('modal-add')">+ Tambah</button>
      </div>
    </div>

    <!-- Stats Cards -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px" id="stats-row"></div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Nama</th><th>Skill</th><th>Fee Per Sesi</th><th>Tagihan</th><th>Dibayar</th><th>Sisa</th><th>Akun Bank</th><th>Status</th><th>Aksi</th>
        </tr></thead>
        <tbody id="freelancers-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal Fee Preview -->
  <div class="modal-overlay" id="modal-fee-preview">
    <div class="modal" style="max-width:380px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h2 id="fee-preview-name" style="font-size:16px">Fee Per Sesi</h2>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('modal-fee-preview')">✕</button>
      </div>
      <div id="fee-preview-content"></div>
    </div>
  </div>

  <!-- Modal Tambah -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal" style="max-width:420px">
      <h2>Tambah Freelance</h2>
      <div class="form-group"><label>Nama *</label><input type="text" id="f-name"></div>
      <div class="form-group"><label>Skill *</label>
        <select id="f-skill" style="width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px">
          <option value="Photographer">Photographer</option>
          <option value="Videographer">Videographer</option>
        </select>
      </div>
      <div class="form-group"><label>Telepon (WA)</label><input type="text" id="f-phone" placeholder="08xxx"></div>
      <div class="form-group"><label>No. Rekening</label><input type="text" id="f-bank" placeholder="Bank - No Rek - a.n."></div>
      <div class="form-group"><label>Fee Default (Rp)</label><input type="number" id="f-rate" value="0"></div>
      <div class="form-group"><label>Catatan</label><textarea id="f-notes" rows="2"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('modal-add')">Batal</button>
        <button class="btn btn-primary" onclick="window.saveFreelancer()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Edit + Fee Per Sesi -->
  <div class="modal-overlay" id="modal-edit">
    <div class="modal" style="max-width:500px">
      <h2>Edit Freelance</h2>
      <input type="hidden" id="e-id">
      <div class="form-group"><label>Nama</label><input type="text" id="e-name"></div>
      <div class="form-group"><label>Skill</label>
        <select id="e-skill" style="width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px">
          <option value="Photographer">Photographer</option>
          <option value="Videographer">Videographer</option>
        </select>
      </div>
      <div class="form-group"><label>Telepon (WA)</label><input type="text" id="e-phone" placeholder="08xxx"></div>
      <div class="form-group"><label>No. Rekening</label><input type="text" id="e-bank" placeholder="Bank - No Rek - a.n."></div>
      <div class="form-group"><label>Fee Default (Rp)</label><input type="number" id="e-rate"></div>
      <div class="form-group"><label>Catatan</label><textarea id="e-notes" rows="2"></textarea></div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <h3 style="font-size:14px;margin-bottom:4px">🎭 Fee Per Sesi</h3>
        <p style="font-size:11px;color:var(--text2);margin-bottom:10px">Fee khusus tiap sesi. Kosongkan = pakai fee default.</p>
        <div id="fee-per-session-list"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('modal-edit')">Batal</button>
        <button class="btn btn-primary" onclick="window.updateFreelancer()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Detail -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal" style="max-width:540px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 id="detail-name" style="font-size:18px">Detail Freelance</h2>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('modal-detail')">✕</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Modal WA Preview -->
  <div class="modal-overlay" id="modal-wa-preview">
    <div class="modal" style="max-width:540px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="font-size:18px">📲 Preview WA ke Freelance</h2>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('modal-wa-preview')">✕</button>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:4px">Metode / Rekening Pembayaran</label>
        <select id="wa-payment-method" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Montserrat',sans-serif" onchange="window.updateWaPreviewText()"></select>
      </div>
      <pre id="wa-preview-body" style="background:var(--surface2);padding:12px;border-radius:8px;font-size:12px;white-space:pre-wrap;max-height:300px;overflow:auto"></pre>
      <div class="modal-actions" style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="closeModal('modal-wa-preview')">Batal</button>
        <button class="btn btn-primary" id="wa-preview-only" style="background:var(--blue); color:#fff; border:none">📱 Hanya Kirim WA (Validasi)</button>
        <button class="btn btn-primary" id="wa-preview-confirm" style="background:var(--green)">💰 Rilis & Konfirmasi Bayar</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/app.js"></script>
  
  <script>
    let allSessions = [];

    document.addEventListener('DOMContentLoaded', () => {
    renderSidebar('freelancers');

    (async () => {
      allSessions = await API.get('/api/sessions?active=1');
      load();
    })();
    });

    function waLink(phone) {
    if (!phone) return '#';
    const num = phone.replace(/^0/, '62').replace(/[^0-9]/g, '');
    return `https://wa.me/${num}`;
    }
    async function load() {
    const search = document.getElementById('search').value;
    const url = search ? `/api/freelancers?search=${search}` : '/api/freelancers';
    const list = await API.get(url);

    const totalEarned = list.reduce((s, f) => s + (f.total_earned || 0), 0);
    const totalPaid = list.reduce((s, f) => s + (f.total_paid_freelance || 0), 0);
    const totalRemaining = list.reduce((s, f) => s + (f.remaining_to_pay || 0), 0);
    const unpaidCount = list.filter(f => (f.remaining_to_pay || 0) > 0).length;

    document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
    <div class="stat-label">Freelance</div>
    <div class="stat-value">${list.length}</div>
    </div>
    <div class="stat-card">
    <div class="stat-label">Total Tagihan</div>
    <div class="stat-value">${formatIDR(totalEarned)}</div>
    </div>
    <div class="stat-card">
    <div class="stat-label">Sudah Dibayar</div>
    <div class="stat-value" style="color:var(--green)">${formatIDR(totalPaid)}</div>
    </div>
    <div class="stat-card">
    <div class="stat-label">Sisa Gajian</div>
    <div class="stat-value" style="color:var(--red)">${formatIDR(totalRemaining)}</div>
    </div>
    `;

    document.getElementById('freelancers-table').innerHTML = list.length
    ? list.map(f => {
    const earned = f.total_earned || 0;
    const paid = f.total_paid_freelance || 0;
    const remaining = f.remaining_to_pay || 0;
    const isLunas = remaining <= 0;
    const unpaidCount = f.unpaid_count || 0;
    const fees = f.fees || [];
    const phoneDisplay = f.phone || '-';
    const phoneHref = f.phone ? waLink(f.phone) : '';

    // Fee column: show default/avg fee, click for full breakdown
    const avgFee = fees.length > 0 ? Math.round(fees.reduce((s,fee) => s + fee.fee_amount, 0) / fees.length) : (f.rate_default || 0);
    let feeHtml = '';
    if (avgFee > 0) {
    feeHtml = `<span class="fee-pill" onclick="window.showFeePreview(${f.id})" title="Klik lihat semua sesi">${formatIDR(avgFee)}<span style="font-size:9px;color:var(--text2);margin-left:2px">rata²</span></span>`;
    if (fees.length > 0) feeHtml += ` <span class="fee-pill" onclick="window.showFeePreview(${f.id})" style="font-size:9px;color:var(--text2)">${fees.length} sesi</span>`;
    } else {
    feeHtml = '<span style="font-size:11px;color:var(--text2)">-</span>';
    }

    return `<tr>
    <td>
    <strong>${f.name}</strong>
    ${f.phone ? `<br><a class="phone-link" href="${phoneHref}" target="_blank" title="Chat WA">📱 ${phoneDisplay}</a>` : ''}
    </td>
    <td>${f.skill || '-'}</td>
    <td>${feeHtml}</td>
    <td>${formatIDR(earned)}</td>
    <td style="color:var(--green)">${formatIDR(paid)}</td>
    <td style="font-weight:700">${formatIDR(remaining)}</td>
    <td style="font-size:12px;max-width:150px">${f.bank_account || '<span style="color:var(--text2)">-</span>'}</td>
    <td>${f.is_active ? '<span class="badge badge-confirmed">Aktif</span>' : '<span class="badge badge-cancelled">Nonaktif</span>'}</td>
    <td><div class="btn-group">
    <button class="btn-icon" onclick="window.viewDetail(${f.id})" title="Detail">📋</button>
    <button class="btn-icon" onclick="window.editFreelancer(${f.id})" title="Edit">✏️</button>
    ${!isLunas && unpaidCount > 0 ? `<button class="btn-icon" onclick="window.viewDetail(${f.id})" title="${unpaidCount} job belum dibayar" style="position:relative">💰<span style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;padding:1px 4px;border-radius:8px">${unpaidCount}</span></button>` : ''}
    ${f.is_active
    ? `<button class="btn-icon danger" onclick="window.toggleActive(${f.id},0)" title="Nonaktif">✕</button>`
    : `<button class="btn-icon" onclick="window.toggleActive(${f.id},1)" title="Aktifkan">✓</button>`}
    </div></td>
    </tr>`;
    }).join('')
    : '<tr><td colspan="9" style="text-align:center;color:var(--text2);padding:30px">Belum ada freelance</td></tr>';
    }
    async function showFeePreview(id) {
    const f = await API.get(`/api/freelancers/${id}`);
    document.getElementById('fee-preview-name').textContent = `Fee Per Sesi — ${f.name}`;
    const fees = f.fees || [];
    if (fees.length) {
    document.getElementById('fee-preview-content').innerHTML = fees.map(fee =>
    `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px">
    <span>${fee.session_name || 'Sesi ' + fee.session_id}</span><span style="font-weight:700">${formatIDR(fee.fee_amount)}</span>
    </div>`
    ).join('');
    } else {
    document.getElementById('fee-preview-content').innerHTML = '<p style="color:var(--text2);font-size:12px;text-align:center;padding:20px">Belum ada fee per sesi</p>';
    }
    openModal('modal-fee-preview');
    }
    async function toggleActive(id, active) {
    if (active) await API.post(`/api/freelancers/${id}/activate`);
    else { if (!confirm('Nonaktifkan?')) return; await API.del(`/api/freelancers/${id}`); }
    load();
    }
    async function saveFreelancer() {
    const data = {
    name: document.getElementById('f-name').value,
    skill: document.getElementById('f-skill').value,
    phone: document.getElementById('f-phone').value,
    bank_account: document.getElementById('f-bank').value,
    rate_default: parseInt(document.getElementById('f-rate').value) || 0,
    notes: document.getElementById('f-notes').value,
    };
    if (!data.name) return alert('Nama wajib diisi');
    await API.post('/api/freelancers', data);
    closeModal('modal-add');
    load();
    }
    async function editFreelancer(id) {
    const f = await API.get(`/api/freelancers/${id}`);
    document.getElementById('e-id').value = f.id;
    document.getElementById('e-name').value = f.name;
    document.getElementById('e-skill').value = f.skill || 'Photographer';
    document.getElementById('e-phone').value = f.phone || '';
    document.getElementById('e-bank').value = f.bank_account || '';
    document.getElementById('e-rate').value = f.rate_default || 0;
    document.getElementById('e-notes').value = f.notes || '';

    const feeMap = {};
    for (const fee of (f.fees || [])) feeMap[fee.session_id] = fee.fee_amount;

    document.getElementById('fee-per-session-list').innerHTML = allSessions.length
    ? allSessions.map(s =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <span style="flex:1;font-size:13px">${s.name}</span>
    <input type="number" class="fee-sesi" data-sid="${s.id}" value="${feeMap[s.id] || ''}" placeholder="Rp 0" style="width:140px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px">
    </div>`
    ).join('')
    : '<p style="color:var(--text2);font-size:12px">Belum ada sesi. Buat di Master Sesi dulu.</p>';

    openModal('modal-edit');
    }
    async function updateFreelancer() {
    const id = document.getElementById('e-id').value;
    await API.put(`/api/freelancers/${id}`, {
    name: document.getElementById('e-name').value,
    skill: document.getElementById('e-skill').value,
    phone: document.getElementById('e-phone').value,
    bank_account: document.getElementById('e-bank').value,
    rate_default: parseInt(document.getElementById('e-rate').value) || 0,
    notes: document.getElementById('e-notes').value,
    });

    const fees = [...document.querySelectorAll('.fee-sesi')].map(el => ({
    session_id: parseInt(el.dataset.sid),
    fee_amount: parseInt(el.value) || 0,
    })).filter(f => f.fee_amount > 0);

    await API.post(`/api/freelancers/${id}/fees`, { fees });
    closeModal('modal-edit');
    load();
    }
    async function viewDetail(id) {
    const f = await API.get(`/api/freelancers/${id}`);
    document.getElementById('detail-name').textContent = f.name;
    const phoneHref = f.phone ? waLink(f.phone) : '';

    let html = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
    <div class="stat-card" style="padding:10px;text-align:center">
    <div class="stat-label">Skill</div><div style="font-size:13px;font-weight:700;margin-top:2px">${f.skill || '-'}</div>
    </div>
    <div class="stat-card" style="padding:10px;text-align:center">
    <div class="stat-label">Tagihan</div><div style="font-size:13px;font-weight:700;margin-top:2px">${formatIDR(f.total_earned)}</div>
    </div>
    <div class="stat-card" style="padding:10px;text-align:center">
    <div class="stat-label">Dibayar</div><div style="font-size:13px;font-weight:700;color:var(--green);margin-top:2px">${formatIDR(f.total_paid)}</div>
    </div>
    <div class="stat-card" style="padding:10px;text-align:center">
    <div class="stat-label">Sisa</div><div style="font-size:13px;font-weight:700;color:${f.remaining > 0 ? 'var(--red)' : 'var(--green)'};margin-top:2px">${formatIDR(f.remaining)}</div>
    </div>
    </div>`;

    // Contact info
    html += `<div style="display:flex;gap:12px;margin-bottom:16px;font-size:13px;color:var(--text2)">`;
    if (f.phone) html += `<span>📱 <a class="phone-link" href="${phoneHref}" target="_blank">${f.phone}</a></span>`;
    if (f.bank_account) html += `<span>🏦 ${f.bank_account}</span>`;
    if (f.notes) html += `<span>📝 ${f.notes}</span>`;
    html += `</div>`;

    // Unpaid jobs = Job List
    const unpaid = f.unpaidJobs || [];
    if (unpaid.length) {
      html += `<h3 style="font-size:13px;margin-bottom:6px;font-weight:700">📋 Job Belum Dibayar <span style="background:var(--accent);color:#fff;padding:1px 6px;border-radius:8px;font-size:11px">${unpaid.length}</span></h3>`;
      html += `<div class="modal-table-wrap"><table style="width:100%;font-size:12px"><thead><tr><th style="width:30px"><input type="checkbox" id="pay-all" onclick="togglePayAll(this)"></th><th>Sesi</th><th>Client</th><th>Tgl</th><th style="text-align:right">Fee</th></tr></thead><tbody id="unpaid-jobs">`;
      for (const e of unpaid) {
        html += `<tr><td><input type="checkbox" class="pay-check" data-crew-id="${e.crew_id}" data-fee="${e.fee_amount}" data-client="${e.client_name}" data-session="${e.session_name}"></td><td>${e.session_name}</td><td>${e.client_name}</td><td>${formatDate(e.event_date)}</td><td style="text-align:right;font-weight:700">${formatIDR(e.fee_amount)}</td></tr>`;
      }
      html += `</tbody></table></div>`;
      html += `<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
      <button class="btn btn-sm btn-primary" onclick="payJob(${id})">💰 Bayar Terpilih</button>
      <span style="font-size:11px;color:var(--text2)" id="pay-summary"></span>
      </div>`;
    } else {
      html += `<div style="padding:12px;background:var(--green-bg);border-radius:8px;text-align:center;font-size:13px;color:var(--green);margin-bottom:16px">✅ Semua job sudah dibayar</div>`;
    }

    // Riwayat: paid jobs + legacy payments
    const paidJobs = (f.earnings || []).filter(e => e.is_paid);
    const legacyPayments = f.payments || [];
    if (paidJobs.length || legacyPayments.length) {
      html += `<h3 style="font-size:13px;margin:14px 0 6px;font-weight:700">💰 Riwayat Gajian</h3>`;
      html += `<div class="modal-table-wrap"><table style="width:100%;font-size:12px"><thead><tr><th>Tanggal</th><th>Client</th><th>Sesi</th><th>Metode</th><th style="text-align:right">Jumlah</th></tr></thead><tbody>`;
      // Paid jobs
      for (const e of paidJobs) {
        html += `<tr><td>${formatDate(e.paid_at)}</td><td>${e.client_name}</td><td>${e.session_name}</td><td>job_payment</td><td style="text-align:right;font-weight:700;color:var(--green)">${formatIDR(e.fee_amount)}</td></tr>`;
      }
      // Legacy lump-sum payments
      for (const p of legacyPayments) {
        html += `<tr><td>${formatDate(p.payment_date)}</td><td>-</td><td>-</td><td>${p.method || '-'}</td><td style="text-align:right;font-weight:700;color:var(--green)">${formatIDR(p.amount)}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }

    document.getElementById('detail-content').innerHTML = html;
    openModal('modal-detail');
    }

    function togglePayAll(el) {
    document.querySelectorAll('.pay-check').forEach(c => c.checked = el.checked);
    updatePaySummary();
    }

    function updatePaySummary() {
    const checked = document.querySelectorAll('.pay-check:checked');
    let total = 0;
    checked.forEach(c => total += parseInt(c.dataset.fee));
    const el = document.getElementById('pay-summary');
    if (el) el.textContent = checked.length ? `${checked.length} job · Total: ${formatIDR(total)}` : '';
    }

    document.addEventListener('change', e => {
    if (e.target.classList.contains('pay-check')) updatePaySummary();
    });

    let currentFreelancer = null;
    let currentJobsText = '';
    let currentTotal = 0;
    let currentCrewIds = [];

    // Rebuilds the preview message based on selected payment method
    function updateWaPreviewText() {
      if (!currentFreelancer) return;
      const f = currentFreelancer;
      const selectEl = document.getElementById('wa-payment-method');
      const selectedMethod = selectEl ? selectEl.value : 'Transfer Bank';

      const msg = `━━━━━━━━━━━━━━━━━━
💰 *PEMBAYARAN FEE FREELANCE*
━━━━━━━━━━━━━━━━━━

Halo ${f.name},

Sorehari akan membayarkan fee untuk job berikut:

${currentJobsText}

━━━━━━━━━━━━━━━━━━
💵 *Total: ${formatIDR(currentTotal)}*
📅 Tanggal: ${new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}
💳 Pembayaran: ${selectedMethod}
━━━━━━━━━━━━━━━━━━

Terima kasih atas kerjasamanya! 🙏`;

      document.getElementById('wa-preview-body').textContent = msg;
    }

    // Attach to window so it is accessible inline
    window.updateWaPreviewText = updateWaPreviewText;

    async function payJob(freelancerId) {
      const checked = document.querySelectorAll('.pay-check:checked');
      if (!checked.length) return alert('Pilih job yang mau dibayar');
      
      currentCrewIds = Array.from(checked).map(c => parseInt(c.dataset.crewId));
      currentTotal = Array.from(checked).reduce((s, c) => s + parseInt(c.dataset.fee), 0);
      currentJobsText = Array.from(checked).map(c => `• ${c.dataset.session} — ${c.dataset.client} (${formatIDR(parseInt(c.dataset.fee))})`).join('\n');
      
      const f = await API.get(`/api/freelancers/${freelancerId}`);
      currentFreelancer = f;

      // Populate dropdown options
      const selectEl = document.getElementById('wa-payment-method');
      if (selectEl) {
        selectEl.innerHTML = '';
        if (f.bank_account) {
          selectEl.innerHTML += `<option value="Transfer Bank (${f.bank_account})">Transfer Bank (${f.bank_account})</option>`;
        } else {
          selectEl.innerHTML += `<option value="Transfer Bank (Belum diatur)">Transfer Bank (Belum diatur)</option>`;
        }
        selectEl.innerHTML += `<option value="Cash / Tunai">Cash / Tunai</option>`;
        selectEl.innerHTML += `<option value="E-Wallet">E-Wallet</option>`;
      }

      updateWaPreviewText();

      // Option A: Only send WhatsApp message for validation (No DB write)
      document.getElementById('wa-preview-only').onclick = () => {
        closeModal('modal-wa-preview');
        const selectedMethod = selectEl ? selectEl.value : 'Transfer Bank';
        
        const validationMsg = `━━━━━━━━━━━━━━━━━━
📱 *VALIDASI TAGIHAN FREELANCE*
━━━━━━━━━━━━━━━━━━

Halo ${f.name},

Mohon dicek & divalidasi terlebih dahulu untuk rincian job berikut:

${currentJobsText}

━━━━━━━━━━━━━━━━━━
💵 *Total: ${formatIDR(currentTotal)}*
💳 Pembayaran: ${selectedMethod}
━━━━━━━━━━━━━━━━━━

*Catatan:*
Jika data di atas sudah benar, silakan kabari ya agar dana bisa segera dirilis. Terima kasih! 🙏`;
        window.open(`https://wa.me/${f.phone.replace(/^0/, '62')}?text=${encodeURIComponent(validationMsg)}`, '_blank');
      };

      // Option B: Confirm Payment and release (DB write + WhatsApp notification with digital receipt link)
      document.getElementById('wa-preview-confirm').onclick = async () => {
        closeModal('modal-wa-preview');
        const selectedMethod = selectEl ? selectEl.value : 'Transfer Bank';
        
        // Pay and get token
        const result = await API.post(`/api/freelancers/${freelancerId}/pay-job`, { 
          crew_ids: currentCrewIds,
          method: selectedMethod
        });
        
        const receiptLink = `${window.location.protocol}//${window.location.host}/receipt/freelance/${result.payment_token}`;
        
        const paidMsg = `━━━━━━━━━━━━━━━━━━
💰 *PEMBAYARAN FEE FREELANCE (LUNAS)*
━━━━━━━━━━━━━━━━━━

Halo ${f.name},

Sorehari TELAH mentransfer fee untuk job berikut:

${currentJobsText}

━━━━━━━━━━━━━━━━━━
💵 *Total: ${formatIDR(currentTotal)}*
📅 Tanggal: ${new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}
💳 Pembayaran: ${selectedMethod}
━━━━━━━━━━━━━━━━━━

Resi / Kuitansi Pembayaran Resmi:
${receiptLink}

Terima kasih atas kerjasamanya! 🙏`;

        // Open WhatsApp with receipt
        window.open(`https://wa.me/${f.phone.replace(/^0/, '62')}?text=${encodeURIComponent(paidMsg)}`, '_blank');
        viewDetail(freelancerId);
        load();
      };
      openModal('modal-wa-preview');
    }

  </script>
</body>
