<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Clients — Vendor Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/admin.css">
  <style>
    .client-card {
      background: var(--surface2); border-radius: 16px; padding: 20px; border: 1px solid var(--border);
      transition: all 0.2s; cursor: default;
    }
    .client-card:hover { border-color: var(--accent); }
    .client-name { font-weight: 700; font-size: 15px; }
    .client-partner { font-size: 13px; color: var(--text2); }
    .client-meta { font-size: 12px; color: var(--text2); margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    .client-meta span { display: flex; align-items: center; gap: 4px; }
    .client-finance { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
    .client-finance .item { background: var(--surface); border-radius: 10px; padding: 10px 12px; }
    .client-finance .item .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .client-finance .item .val { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 4px; margin-top: 12px; overflow: hidden; }
    .progress-bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .client-actions { display: flex; gap: 6px; margin-top: 12px; }
    .client-actions .btn { font-size: 11px; padding: 6px 12px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .detail-row:last-child { border: none; }
    .detail-row .label { color: var(--text2); }
    .detail-row .val { font-weight: 600; }
    
    /* Status filter tabs */
    .tab-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* Month grouping and compact lists */
    .month-header {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin: 24px 0 10px 0;
      padding-bottom: 6px;
      border-bottom: 1px dashed var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .client-list-compact {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .client-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      gap: 16px;
      transition: all 0.2s;
    }
    .client-row:hover {
      border-color: var(--accent);
      background: rgba(201, 169, 110, 0.03);
    }
    
    /* Calendar Date Badge */
    .date-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .date-badge .day-num {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }
    .date-badge .day-name {
      font-size: 9px;
      color: var(--text2);
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Highlight Section for upcoming weddings */
    .highlight-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .highlight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    /* Reschedule / Follow-up Warning Styles */
    @keyframes pulse-warning {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
      70% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }
    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .followup-warning {
      border: 2px solid #ef4444 !important;
      background: rgba(239, 68, 68, 0.02) !important;
      position: relative !important;
    }
    .btn-pulse-tagih {
      background: #dc2626 !important;
      color: #fff !important;
      animation: pulse-warning 1.8s infinite !important;
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="page-header">
      <h1>👥 Clients</h1>
      <div class="btn-group">
        <div class="search-bar"><input type="text" placeholder="Cari nama/phone..." id="search" oninput="window.loadClients && window.loadClients()"></div>
      </div>
    </div>

    <!-- Stats row -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px" id="stats-row"></div>

    <!-- Status Filters -->
    <div class="tab-filters">
      <button class="tab-btn active" id="tab-persiapan" onclick="window.changeTab('persiapan')">📅 Booking &amp; Persiapan</button>
      <button class="tab-btn" id="tab-hari-h" onclick="window.changeTab('hari-h')">📸 Hari H</button>
      <button class="tab-btn" id="tab-on-progress" onclick="window.changeTab('on-progress')">🎞️ Post-Event (On Progress)</button>
      <button class="tab-btn" id="tab-completed" onclick="window.changeTab('completed')">🏁 Selesai Pekerjaan</button>
      <button class="tab-btn" id="tab-all" onclick="window.changeTab('all')">Semua Client</button>
    </div>

    <!-- Highlight Section for Upcoming Weddings -->
    <div id="highlight-section" style="display:none">
      <div class="highlight-title">🔥 Jadwal Terdekat (Mendatang)</div>
      <div class="highlight-grid" id="highlight-list"></div>
    </div>

    <!-- Client list container grouped by month -->
    <div id="clients-list-container"></div>
  </div>

  <!-- Modal Detail -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal" style="max-width:500px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 id="detail-title" style="font-size:18px">Detail Client</h2>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('modal-detail')">✕</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Modal Konfirmasi Pelunasan -->
  <div class="modal-overlay" id="modal-pelunasan">
    <div class="modal" style="max-width:440px">
      <h2 style="font-size:18px">💰 Konfirmasi Pelunasan</h2>
      <p style="font-size:12px;color:var(--text2);margin:8px 0 16px" id="pelunasan-info"></p>
      <div id="pelunasan-modal-body"></div>
    </div>
  </div>

  <!-- Modal: Selesaikan Booking (identical to booking-detail.html) -->
  <div class="modal-overlay" id="modal-confirm-completed" style="z-index: 210">
    <div class="modal" style="max-width:460px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:16px;margin:0">🏁 Konfirmasi Selesaikan Booking</h2>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('modal-confirm-completed')" style="font-size:12px">✕</button>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Memproses penutupan booking secara permanen. Seluruh administrasi &amp; pembayaran freelance harus tuntas.</p>

      <div id="completed-unpaid-box" style="padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px"></div>

      <div class="modal-actions" style="display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-secondary" onclick="closeModal('modal-confirm-completed')" style="font-size:12px">Batal</button>
        <button class="btn btn-primary" id="btn-submit-completed" style="font-size:12px">Ya, Selesaikan</button>
      </div>
    </div>
  </div>

  <!-- Modal: WA Preview Freelance Payment (identical to booking-detail.html) -->
  <div class="modal-overlay" id="modal-wa-pay" style="z-index: 220">
    <div class="modal" style="max-width:540px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="font-size:18px">📲 Preview WA ke Freelance</h2>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('modal-wa-pay')">✕</button>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:4px">Metode / Rekening Pembayaran</label>
        <select id="bdet-wa-payment-method" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Montserrat',sans-serif" onchange="window.bdetUpdateWaPreview()"></select>
      </div>
      <pre id="bdet-wa-preview-body" style="background:var(--surface2);padding:12px;border-radius:8px;font-size:12px;white-space:pre-wrap;max-height:300px;overflow:auto;line-height:1.6"></pre>
      <div class="modal-actions" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="closeModal('modal-wa-pay')">Batal</button>
        <button class="btn btn-primary" id="bdet-wa-only" style="background:var(--blue);color:#fff;border:none">📱 Hanya Kirim WA (Validasi)</button>
        <button class="btn btn-primary" id="bdet-wa-confirm" style="background:var(--green)">💰 Rilis &amp; Konfirmasi Bayar</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/app.js"></script>
  <script>
    let templates = {};
    let currentTab = 'persiapan';

    window.changeTab = function(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      window.loadClients();
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderSidebar('clients');
      window.loadClients();
    });

    function renderTemplate(tpl, vars) {
      if (!tpl) return '';
      let result = tpl;
      result = result.replace(/\{\{#(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (m, key, content) => {
        if (!vars[key]) return '';
        return content.replace(/\{\{(\w+)\}\}/g, (m2, k) => vars[k] !== undefined ? String(vars[k]) : m2);
      });
      result = result.replace(/\{\{(\w+)\}\}/g, (m, k) => vars[k] !== undefined ? String(vars[k]) : m);
      return result;
    }

    window.loadClients = async function() {
        const search = document.getElementById('search').value;
        
        // Fetch clients, settings, and templates in parallel
        const [clientsRaw, settings, templatesRaw] = await Promise.all([
          API.get('/api/clients/confirmed'),
          API.get('/api/settings'),
          API.get('/api/templates')
        ]);
        let clients = clientsRaw;
        templates = templatesRaw;
        const followupDays = parseInt(settings.followup_h_days) || 10;

        // Apply Tab Filter
        if (currentTab === 'persiapan') {
          clients = clients.filter(c => ['confirmed', 'in_progress'].includes(c.booking_status));
          clients.sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
        } else if (currentTab === 'hari-h') {
          clients = clients.filter(c => c.booking_status === 'event_day');
          clients.sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
        } else if (currentTab === 'on-progress') {
          clients = clients.filter(c => ['editing', 'delivery'].includes(c.booking_status));
          clients.sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
        } else if (currentTab === 'completed') {
          clients = clients.filter(c => c.booking_status === 'completed');
          clients.sort((a, b) => new Date(b.event_date) - new Date(a.event_date));
        } else {
          // All: sort by event date
          clients.sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
        }

        if (search) {
          const q = search.toLowerCase();
          clients = clients.filter(c => c.name.toLowerCase().includes(q) || (c.phone||'').includes(q));
        }

        // Stats
        const totalRevenue = clients.reduce((s, c) => s + (c.total_paid || 0), 0);
        const totalProfit = clients.reduce((s, c) => s + (c.profit || 0), 0);
        const pendingPelunasan = clients.filter(c => (c.total_paid || 0) < (c.package_price || 0)).length;

        document.getElementById('stats-row').innerHTML = `
          <div class="client-card" style="text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Total Client</div>
            <div style="font-size:24px;font-weight:800;margin-top:4px">${clients.length}</div>
          </div>
          <div class="client-card" style="text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Total Pendapatan</div>
            <div style="font-size:18px;font-weight:800;color:var(--green);margin-top:4px">${formatIDR(totalRevenue)}</div>
          </div>
          <div class="client-card" style="text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Total Profit</div>
            <div style="font-size:18px;font-weight:800;color:var(--green);margin-top:4px">${formatIDR(totalProfit)}</div>
          </div>
          <div class="client-card" style="text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Menunggu Pelunasan</div>
            <div style="font-size:18px;font-weight:800;color:var(--accent);margin-top:4px">${pendingPelunasan}</div>
          </div>`;

        // Render Highlight Section (only for "persiapan" or "all" tabs and no active search filter)
        const highlightSection = document.getElementById('highlight-section');
        const highlightList = document.getElementById('highlight-list');
        
        const statusColors = {
          confirmed: 'var(--blue)',
          in_progress: 'var(--accent,#C9A96E)',
          event_day: '#7c3aed',
          editing: '#0891b2',
          delivery: '#059669',
          completed: 'var(--green)',
          archived: 'var(--text2)',
          cancelled: 'var(--red)'
        };
        const statusLabels = {
          confirmed: 'Confirmed',
          in_progress: 'Persiapan',
          event_day: '📸 Hari H',
          editing: '🎞️ Pengeditan',
          delivery: '📦 Penyerahan',
          completed: '✅ Selesai',
          archived: 'Arsip',
          cancelled: 'Batal'
        };

        const todayStr = new Date().toISOString().split('T')[0];
        const upcomingActive = clients.filter(c => 
          c.booking_status !== 'completed' && 
          c.booking_status !== 'cancelled' && 
          c.event_date >= todayStr
        );

        if ((currentTab === 'persiapan' || currentTab === 'all') && upcomingActive.length > 0 && !search) {
          highlightSection.style.display = 'block';
          const top3 = upcomingActive.slice(0, 3);
          
          highlightList.innerHTML = top3.map(c => {
            const paid = c.total_paid || 0;
            const price = c.package_price || 0;
            const remaining = price - paid;
            const pct = price > 0 ? Math.round((paid/price)*100) : 0;
            const isLunas = price > 0 && paid >= price;
            const phone = (c.phone || '').replace(/^0/, '62').replace(/[^0-9]/g, '');
            
            // Calculate days left to event date
            const eventTime = new Date(c.event_date + 'T00:00:00').getTime();
            const todayTime = new Date(todayStr + 'T00:00:00').getTime();
            const diffDays = Math.ceil((eventTime - todayTime) / (1000 * 60 * 60 * 24));
            
            const isFollowupAlert = !isLunas && diffDays >= 0 && diffDays <= followupDays;
            
            const defaultMsg = `Halo Kak {{client_name}}! 👋\n\nKami dari *{{vendor_name}}* ingin mengingatkan bahwa pembayaran untuk acara {{event_date}} di {{venue}} masih ada sisa pelunasan sebesar *{{remaining}}*.\n\nMohon bisa diselesaikan maksimal 7 hari sebelum acara ya, Kak. Terima kasih! 🙏`;
            const waMsg = renderTemplate(templates.wa_tagih_h_x || defaultMsg, {
              client_name: c.name,
              vendor_name: settings.vendor_name || 'Sorehari Photography',
              event_date: formatDate(c.event_date),
              venue: c.venue || '-',
              remaining: formatIDR(remaining)
            });
            const waLink = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(waMsg)}` : '#';

            let cardClass = "client-card";
            let cardStyle = "";
            let badgeHtml = "";
            let tagihBtnClass = "btn btn-sm";
            let tagihBtnStyle = "background:#25D366;color:#fff;text-decoration:none;display:inline-flex;align-items:center";

            if (isLunas) {
              cardStyle = 'style="border:2px solid var(--green);position:relative"';
              badgeHtml = '<div style="position:absolute;top:-1px;right:16px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:0 0 6px 6px;letter-spacing:1px">✅ LUNAS</div>';
            } else if (isFollowupAlert) {
              cardClass += " followup-warning";
              badgeHtml = `<div style="position:absolute;top:-1px;right:16px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:0 0 6px 6px;letter-spacing:1px;animation:pulse-badge 1.5s infinite">⚠️ H-${diffDays} BELUM LUNAS</div>`;
              tagihBtnClass += " btn-pulse-tagih";
            }

            return `<div class="${cardClass}" ${cardStyle}>
              ${badgeHtml}
              <div style="display:flex;justify-content:space-between;align-items:start">
                <div>
                  <div class="client-name">${c.name}</div>
                  <div class="client-partner">${c.partner_name ? '♡ ' + c.partner_name : ''}</div>
                </div>
                <span class="badge" style="background:${statusColors[c.booking_status]};color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${statusLabels[c.booking_status]}</span>
              </div>
              <div class="client-meta">
                <span>📅 ${formatDate(c.event_date)}</span>
                <span>📍 ${c.venue || '-'}</span>
                <span>🏷️ ${c.package_name || '-'}</span>
              </div>
              <div class="client-finance">
                <div class="item"><div class="label">Harga Paket</div><div class="val">${formatIDR(price)}</div></div>
                <div class="item"><div class="label">Dibayar</div><div class="val" style="color:var(--green)">${formatIDR(paid)}</div></div>
                <div class="item"><div class="label">Sisa</div><div class="val" style="color:${isLunas ? 'var(--green)' : 'var(--red)'}">${formatIDR(Math.max(0,remaining))}</div></div>
              </div>
              <div class="progress-bar">
                <div class="fill" style="width:${pct}%;background:${isLunas ? 'var(--green)' : 'var(--blue)'}"></div>
              </div>
              <div class="client-actions">
                <button class="btn btn-sm btn-secondary" onclick="viewDetail(${c.booking_id})">Detail</button>
                ${!isLunas ? `<a href="${waLink}" target="_blank" class="${tagihBtnClass}" style="${tagihBtnStyle}">💬 Tagih</a>` : ''}
                ${!isLunas ? `<button class="btn btn-sm btn-primary" onclick="openPelunasan(${c.booking_id},'${c.name}',${remaining})">💰 Pelunasan</button>` : ''}
              </div>
            </div>`;
          }).join('');
        } else {
          highlightSection.style.display = 'none';
        }

        // Render Month-Grouped Compact List
        const listContainer = document.getElementById('clients-list-container');
        if (clients.length === 0) {
          listContainer.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px">Belum ada client</div>';
          return;
        }

        // Group clients by Month-Year
        const groups = {};
        clients.forEach(c => {
          if (!c.event_date) return;
          const dt = new Date(c.event_date + 'T00:00:00');
          const key = dt.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
          if (!groups[key]) groups[key] = [];
          groups[key].push(c);
        });

        let containerHtml = '';
        for (const [monthYear, list] of Object.entries(groups)) {
          containerHtml += `
            <div class="month-header">
              <span>📅</span> ${monthYear} <span style="font-size:11px;color:var(--text2);font-weight:normal">(${list.length} acara)</span>
            </div>
            <div class="client-list-compact">
              ${list.map(c => {
                const paid = c.total_paid || 0;
                const price = c.package_price || 0;
                const remaining = price - paid;
                const isLunas = price > 0 && paid >= price;
                
                const dt = new Date(c.event_date + 'T00:00:00');
                const dayNum = dt.getDate();
                const dayName = dt.toLocaleDateString('id-ID', { weekday: 'short' });

                const defaultMsg = `Halo Kak {{client_name}}! 👋\n\nKami dari *{{vendor_name}}* ingin mengingatkan bahwa pembayaran untuk acara {{event_date}} di {{venue}} masih ada sisa pelunasan sebesar *{{remaining}}*.\n\nTerima kasih! 🙏`;
                const waMsg = renderTemplate(templates.wa_tagih_h_x || defaultMsg, {
                  client_name: c.name,
                  vendor_name: settings.vendor_name || 'Sorehari Photography',
                  event_date: formatDate(c.event_date),
                  venue: c.venue || '-',
                  remaining: formatIDR(remaining)
                });
                const waLink = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(waMsg)}` : '#';

                return `
                  <div class="client-row" style="${isLunas ? 'border-left: 4px solid var(--green)' : ''}">
                    <!-- Left: Date Badge -->
                    <div class="date-badge">
                      <span class="day-num">${dayNum}</span>
                      <span class="day-name">${dayName}</span>
                    </div>

                    <!-- Middle: Info -->
                    <div style="flex:1; min-width:0">
                      <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap">
                        <strong style="font-size:14px; color:var(--text); cursor:pointer" onclick="viewDetail(${c.booking_id})">${c.name}</strong>

💰 *PEMBAYARAN FEE FREELANCE*

${jobsText}

    async function openWaPayModal(freelancerId, crewIds, jobLines, total, afterPayCallback) {
      const f = await API.get(`/api/freelancers/${freelancerId}`);
      const jobsText = jobLines.map(j => `• ${j.session_name} (${formatIDR(j.fee_amount)})`).join('\n');
      _waPayState = { freelancerId, f, crewIds, jobsText, total, afterPayCallback };

      const selectEl = document.getElementById('bdet-wa-payment-method');
      selectEl.innerHTML = '';
      let hasAccount = false;
      if (f.bank_account) {
        try {
          const accounts = JSON.parse(f.bank_account);
          if (Array.isArray(accounts) && accounts.length > 0) {
            accounts.forEach(acc => {
              const label = `${acc.provider} (${acc.number} a.n. ${acc.holder})`;
              selectEl.innerHTML += `<option value="Transfer / E-Wallet (${label})">Transfer / E-Wallet (${label})</option>`;
            });
            hasAccount = true;
          }
        } catch (e) {}
      }
      if (!hasAccount) {
        const raw = f.bank_account ? f.bank_account : 'Belum diatur';
        selectEl.innerHTML = `<option value="Transfer / E-Wallet (${raw})">Transfer / E-Wallet (${raw})</option>`;
      }
      selectEl.innerHTML += `<option value="Cash / Tunai">Cash / Tunai</option>`;

      bdetUpdateWaPreview();

      document.getElementById('bdet-wa-only').onclick = () => {
        const method = selectEl.value;
        
        let bankProvider = 'Transfer';
        let bankNum = '';
        let bankHolder = '';
        if (f.bank_account) {
          try {
            const accs = JSON.parse(f.bank_account);
            if (accs.length > 0) {
              bankProvider = accs[0].provider || 'Transfer';
              bankNum = accs[0].number || '';
              bankHolder = accs[0].holder || '';
            }
          } catch(e) {
            bankNum = f.bank_account;
          }
        }
        
        const defaultValMsg = `Halo {{freelancer_name}} 👋\n\nSistem {{vendor_name}} telah mencatat total pembayaran honor/fee Anda untuk project *{{client_name}}* sebesar *{{total_fee}}*.\n\nMohon periksa & konfirmasi kembali nomor rekening Anda:\n🏦 *{{bank_name}}*\n💳 *{{bank_account}}* (a.n. {{bank_holder}})\n\nJika sudah benar, balas pesan ini agar admin segera mencairkan dana. Terima kasih! 🙏`;
        const validationMsg = renderTemplate(templates.wa_freelance_validation || defaultValMsg, {
          freelancer_name: f.name,
          vendor_name: 'Sorehari Photography',
          client_name: 'Client Projects',
          total_fee: formatIDR(total),
          bank_name: bankProvider,
          bank_account: bankNum,
          bank_holder: bankHolder
        });

        if (f.phone) {
          window.open(`https://wa.me/${f.phone.replace(/^0/, '62')}?text=${encodeURIComponent(validationMsg)}`, '_blank');
        }
        closeModal('modal-wa-pay');
      };

      document.getElementById('bdet-wa-confirm').onclick = async () => {
        closeModal('modal-wa-pay');
        const method = selectEl.value;
        try {
          const result = await API.post(`/api/freelancers/${freelancerId}/pay-job`, {
            crew_ids: crewIds,
            method
          });
          const receiptLink = `${window.location.protocol}//${window.location.host}/receipt/freelance/${result.payment_token}`;
          
          const defaultPaidMsg = `Halo {{freelancer_name}} ✨\n\nHalo, pembayaran honor/fee Anda untuk project *{{client_name}}* sebesar *{{total_fee}}* telah ditransfer ke rekening Anda.\n\nBukti transfer dapat diunduh di tautan berikut:\n{{receipt_url}}\n\nTerima kasih atas kerja kerasnya di lapangan! Semoga sukses selalu 🙏`;
          const paidMsg = renderTemplate(templates.wa_freelance_paid || defaultPaidMsg, {
            freelancer_name: f.name,
            client_name: 'Client Projects',
            total_fee: formatIDR(total),
            receipt_url: receiptLink
          });

          if (f.phone) {
            window.open(`https://wa.me/${f.phone.replace(/^0/, '62')}?text=${encodeURIComponent(paidMsg)}`, '_blank');
          }
          if (typeof afterPayCallback === 'function') await afterPayCallback();
        } catch (err) {
          console.error('Payment error:', err);
          alert('Gagal memproses pembayaran: ' + (err.message || 'Terjadi kesalahan'));
        }
      };

      openModal('modal-wa-pay');
    }

    window.payBulkFromModal = async function (btn) {
      const freelancerId = parseInt(btn.getAttribute('data-freelancer-id'), 10);
      const currentBookingId = parseInt(btn.getAttribute('data-booking-id'), 10);
      const checkboxes = document.querySelectorAll(`.crew-cb-${freelancerId}:checked`);
      if (checkboxes.length === 0) { alert('Pilih minimal satu sesi terlebih dahulu.'); return; }

      const crewIds = [];
      const jobLines = [];
      let total = 0;
      checkboxes.forEach(cb => {
        const id = parseInt(cb.getAttribute('data-id'), 10);
        const fee = parseInt(cb.getAttribute('data-amount') || '0', 10);
        const sessionName = cb.closest('div').querySelector('span[style]')?.textContent?.trim() || 'Sesi';
        crewIds.push(id);
        jobLines.push({ session_name: sessionName, fee_amount: fee });
        total += fee;
      });

      await openWaPayModal(freelancerId, crewIds, jobLines, total, async () => {
        await window.checkUnpaidCrewForCompletion(currentBookingId);
      });
    };

    window.toggleSelectAllUnpaid = function (freelancerId, checked) {
      const checkboxes = document.querySelectorAll(`.crew-cb-${freelancerId}`);
      checkboxes.forEach(cb => cb.checked = checked);
      window.updateBulkPayButton(freelancerId);
    };

    window.updateBulkPayButton = function (freelancerId) {
      const checkboxes = document.querySelectorAll(`.crew-cb-${freelancerId}:checked`);
      const button = document.getElementById(`btn-pay-bulk-${freelancerId}`);
      const txt = document.getElementById(`pay-total-txt-${freelancerId}`);

      let total = 0;
      checkboxes.forEach(cb => {
        total += parseInt(cb.getAttribute('data-amount') || '0', 10);
      });

      txt.textContent = formatIDR(total);

      if (checkboxes.length === 0) {
        button.disabled = true;
        button.style.opacity = '0.5';
        button.style.pointerEvents = 'none';
      } else {
        button.disabled = false;
        button.style.opacity = '1';
        button.style.pointerEvents = 'auto';
      }
    };

    window.openCompletionModal = function (bookingId) {
      _activeBookingId = bookingId;
      openModal('modal-confirm-completed');

      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.5';
      submitBtn.style.pointerEvents = 'none';

      try {
        const res = await fetch(`/api/bookings/${id}/unpaid-crew`);

          box.style.border = '1px solid #fee2e2';

                 <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:6px">

              <span style="color:#dc2626;font-size:16px">⚠️</span> Ada Pembayaran Freelance Belum Terkirim!

    window.executeAdvanceToStage = async function (status, id) {
      try {
        const res = await fetch(`/api/bookings/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        const data = await res.json();
        if (!res.ok) {
          alert('Gagal update status: ' + (data.error || 'Terjadi kesalahan'));
          return;
        }
        closeModal('modal-confirm-completed');
        window.loadClients();
      } catch (e) { alert('Kesalahan jaringan'); }
    };

    async function openPelunasan(bookingId, name, remaining) {
      document.getElementById('pelunasan-info').textContent = `Client: ${name}`;

          // Case A: Client already uploaded receipt
          const receiptUrl = pendingPelunasan.reference ? `/api/uploads/receipts/${pendingPelunasan.reference}` : null;
          bodyEl.innerHTML = `

                <div><span style="color:var(--text2)">Metode:</span> <strong>${pendingPelunasan.payment_method || '-'}</strong></div>
                <div><span style="color:var(--text2)">Tanggal Kirim:</span> <strong>${formatDate(pendingPelunasan.payment_date)}</strong></div>
                <div><span style="color:var(--text2)">Catatan:</span> <strong>${pendingPelunasan.notes || '-'}</strong></div>
              </div>
              ${receiptUrl ? `<div style="text-align:center"><label style="font-size:10px; color:var(--text2); display:block; margin-bottom:4px">KLIk BUKTI UNTUK MEMPERBESAR</label><img src="${receiptUrl}" style="max-height:220px; max-width:100%; border-radius:8px; cursor:pointer; border:1px solid var(--border)" onclick="window.open(this.src)"></div>` : ''}
            </div>

              <button class="btn btn-secondary" onclick="closeModal('modal-pelunasan')">Batal</button>
              <button class="btn btn-primary" onclick="window.confirmPelunasanDirect(${bookingId}, ${pendingPelunasan.amount})" style="background:var(--green)">✅ Verifikasi & Konfirmasi</button>
            </div>

              <div class="form-group"><label>Metode</label>

    window.confirmPelunasanDirect = async function(bookingId, amount) {
      if (!confirm('Verifikasi dan konfirmasi pembayaran pelunasan ini?')) return;
      try {
        await API.post(`/api/bookings/${bookingId}/confirm-pelunasan`);
        closeModal('modal-pelunasan');
        alert('Pelunasan berhasil diverifikasi!');
        
        // Auto-send WA confirmation to client
        await window.sendWaConfirmation(bookingId, amount);
        window.loadClients();
      } catch (e) {
        alert('Gagal mengonfirmasi pelunasan: ' + e.message);
      }
    };

    window.saveManualPelunasan = async function() {
      const id = document.getElementById('pul-booking-id').value;
      const amount = parseRupiah(document.getElementById('pul-amount').value);
      const date = document.getElementById('pul-date').value;
      const method = document.getElementById('pul-method').value;
      const notes = document.getElementById('pul-notes').value || 'Pelunasan manual';

      if (!amount || !date) return alert('Jumlah dan tanggal wajib diisi');

      try {
        await API.post(`/api/bookings/${id}/payments`, {
          type: 'pelunasan',
          amount,
          payment_date: date,
          payment_method: method,
          notes
        });
        
        // Also call confirm-pelunasan endpoint to verify it instantly
        await API.post(`/api/bookings/${id}/confirm-pelunasan`);
        
        closeModal('modal-pelunasan');
        alert('Pelunasan manual berhasil disimpan!');
        
        // Auto-send WA confirmation to client
        await window.sendWaConfirmation(id, amount);
        window.loadClients();
      } catch (e) {
        alert('Gagal menyimpan pelunasan manual: ' + e.message);
      }
    };

          vendor_name: templates.vendor_name || 'Wedding-Management',
          remaining: formatIDR(remaining),
          pelunasan_url: pelunasanUrl
        });
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
      } catch (e) {
        alert('Gagal membuat link pelunasan: ' + e.message);
      }
    };

    window.sendWaConfirmation = async function(bookingId, amount) {
      try {
        const bk = await API.get(`/api/bookings/${bookingId}`);
        if (bk && bk.client && bk.client.phone) {
          const phone = bk.client.phone.replace(/^0/, '62').replace(/[^0-9]/g, '');
          const year = new Date(bk.event_date || Date.now()).getFullYear();
          const bookingCode = `SH-${year}-${String(bookingId).padStart(4,'0')}`;
          const trackUrl = `${window.location.origin}/track.html?code=${bookingCode}&date=${bk.event_date}`;
          const clientName = bk.client_name || 'Kak';
          const msg = `Halo ${clientName}! 👋\n\nPembayaran pelunasan Anda sebesar *${formatIDR(amount)}* telah *DIKONFIRMASI* ✅\n\nTim kami segera memulai proses pengeditan foto & video Anda.\n\n🔖 Kode Booking: *${bookingCode}*\n🔍 Pantau progress pekerjaan di:\n${trackUrl}\n\nTerima kasih atas kepercayaan Anda! 🙏📸`;
          window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
      } catch(e) {}
    };
  </script>
</body>
</html>
