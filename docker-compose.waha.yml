version: '3.8'

services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - WHA_WEBHOOK_URL=http://host.docker.internal:3000/api/wa/webhook
      - WHA_DEFAULT_ENGINE=WEBJS
      - WHA_SESSION_NAME=sorehari
    volumes:
      - ./waha-data:/data
    networks:
      - sorehari-network

networks:
  sorehari-network:
    external: true
