<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Sorehari</title>
    <link rel="icon" type="image/png" href="/image/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F9F8F6;
        }

        .serif-title {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>

<body class="min-h-screen bg-[#F9F8F6] text-slate-900">
    <header class="sticky top-0 z-30 bg-[#F9F8F6] border-b border-slate-200/80">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 md:px-10">
            <a href="/" class="text-xs font-semibold uppercase tracking-[0.4em] text-slate-600 hover:text-slate-900">←
                Home</a>
            <h1 class="text-lg font-bold text-slate-900">Portfolio</h1>
            <a href="/#contact"
                class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-600 hover:text-slate-900">Contact</a>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-10 md:px-10 md:py-16">
        <div class="mb-12 text-center">
            <h2 class="serif-title text-4xl font-semibold text-slate-900 sm:text-5xl">Karya Kami</h2>
            <p class="mt-4 text-slate-700">Koleksi momen spesial dari klien-klien yang telah mempercayai Sorehari</p>
        </div>

        <div id="clients-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Clients carousel will be loaded here -->
        </div>

        <!-- Pagination Controls -->
        <div id="pagination-controls" class="mt-16 flex justify-center items-center gap-4 hidden">
            <button id="prev-page"
                class="rounded-full bg-white border border-slate-200 p-3 text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span id="page-info" class="text-sm font-semibold text-slate-600 tracking-widest uppercase">Page 1 of
                1</span>
            <button id="next-page"
                class="rounded-full bg-white border border-slate-200 p-3 text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </main>

    <footer class="border-t border-slate-200/80 bg-[#F9F8F6] px-6 py-8 mt-20 md:px-10">
        <div
            class="mx-auto flex max-w-7xl flex-col gap-4 text-sm text-slate-600 sm:flex-row sm:justify-between sm:items-center">
            <p>© 2026 Sorehari. All rights reserved.</p>
            <a href="/#contact" class="font-semibold text-slate-900 hover:text-slate-700">hello@sorehari.com</a>
        </div>
    </footer>

    <script>
        const API_URL = '/api';
        const BASE_URL = '';
        let carousels = {};

        let allClients = [];
        let currentPage = 1;
        const clientsPerPage = 6; // 3x2 grid

        function showBackendBanner(message) {
            let b = document.getElementById('backend-banner');
            if (!b) {
                b = document.createElement('div');
                b.id = 'backend-banner';
                b.className = 'fixed bottom-4 right-4 z-50 rounded bg-yellow-50 border border-yellow-200 p-3 text-sm text-yellow-800 shadow flex items-center gap-3';
                b.innerHTML = `<span id="backend-banner-text"></span><button id="backend-retry" class="ml-2 rounded bg-yellow-600 px-3 py-1 text-white text-xs">Retry</button>`;
                document.body.appendChild(b);
                document.getElementById('backend-retry').addEventListener('click', () => {
                    loadClients(true);
                });
            }
            document.getElementById('backend-banner-text').innerText = message;
            b.style.display = 'flex';
        }

        function hideBackendBanner() {
            const b = document.getElementById('backend-banner');
            if (b) b.style.display = 'none';
        }

        async function loadClients(forceReload = false) {
            const cacheKey = 'sorehari_clients_v1';
            try {
                const res = await fetch(`${API_URL}/clients`);
                if (!res.ok) throw new Error('Network response not ok');
                const clients = await res.json();
                localStorage.setItem(cacheKey, JSON.stringify(clients));
                allClients = clients;
                renderClientsPage(1);
                hideBackendBanner();
                return;
            } catch (err) {
                console.warn('Error loading clients from API:', err);
                const cached = localStorage.getItem(cacheKey);
                if (cached && !forceReload) {
                    try {
                        const clients = JSON.parse(cached);
                        allClients = clients;
                        renderClientsPage(1);
                        showBackendBanner('Menampilkan data cache — backend offline. Klik Retry untuk mencoba lagi.');
                        return;
                    } catch (parseErr) {
                        console.error('Failed to parse cached clients', parseErr);
                    }
                }

                document.getElementById('clients-container').innerHTML =
                    '<p class="text-red-600 col-span-full text-center">Gagal memuat portfolio. Pastikan backend running.</p>';
                showBackendBanner('Backend tidak tersedia. Klik Retry untuk mencoba kembali.');
            }
        }

        function renderClientsPage(page) {
            currentPage = page;
            const container = document.getElementById('clients-container');
            container.innerHTML = '';

            // Clear old carousels
            Object.keys(carousels).forEach(key => {
                clearInterval(carousels[key].autoPlayInterval);
            });
            carousels = {};

            // Only show clients that have photos
            const clientsWithPhotos = allClients.filter(c => c.photos && c.photos.length > 0);

            if (clientsWithPhotos.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-slate-500">Portfolio sedang kosong</p></div>';
                document.getElementById('pagination-controls').classList.add('hidden');
                return;
            }

            const startIndex = (page - 1) * clientsPerPage;
            const endIndex = startIndex + clientsPerPage;
            const clientsToShow = clientsWithPhotos.slice(startIndex, endIndex);

            clientsToShow.forEach(client => {

                const carouselId = `carousel-${client.id}`;
                const clientEl = document.createElement('div');
                clientEl.className = 'rounded-2xl overflow-hidden bg-white shadow-lg border border-slate-100 flex flex-col h-full';
                clientEl.innerHTML = `
                    <div class="relative h-72 sm:h-80 md:h-96 bg-slate-50 overflow-hidden flex-shrink-0">
                        <div id="${carouselId}" class="carousel w-full h-full relative">
                            ${client.photos.map((photo, idx) => `
                                <div class="carousel-item absolute inset-0 transition-opacity duration-700 ease-in-out opacity-0" data-index="${idx}">
                                    <img src="${BASE_URL}${photo.url}" alt="Foto ${idx + 1}" class="w-full h-full object-contain p-2">
                                </div>
                            `).join('')}
                        </div>

                        <!-- Navigation Buttons -->
                        <button onclick="prevSlide('${carouselId}')" class="absolute left-2 top-1/2 -translate-y-1/2 z-10 rounded-full bg-white/90 hover:bg-white p-2 transition shadow-md text-slate-800">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                            </svg>
                        </button>
                        <button onclick="nextSlide('${carouselId}')" class="absolute right-2 top-1/2 -translate-y-1/2 z-10 rounded-full bg-white/90 hover:bg-white p-2 transition shadow-md text-slate-800">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </button>

                        <!-- Dots Indicator -->
                        <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-10">
                            ${client.photos.map((_, idx) => `
                                <button onclick="goToSlide('${carouselId}', ${idx})" class="dot w-1.5 h-1.5 rounded-full transition ${idx === 0 ? 'bg-slate-800' : 'bg-slate-300'}" data-index="${idx}"></button>
                            `).join('')}
                        </div>
                    </div>

                    <div class="p-6 bg-[#fdfcfb] flex flex-col flex-grow text-center border-t border-slate-100 justify-between">
                        <div>
                            <h3 class="serif-title text-2xl font-semibold text-slate-900">${client.name}</h3>
                            <div class="flex flex-row flex-wrap justify-center items-center gap-2 mt-3 text-[10px] text-slate-500 uppercase tracking-widest font-semibold">
                                <span>${client.location || 'Lokasi TBA'}</span>
                                <span class="text-slate-300">•</span>
                                <span>${formatDate(client.event_date) || 'Waktu TBA'}</span>
                            </div>
                            ${client.description ? `<p class="mt-4 text-xs text-slate-500 italic leading-relaxed line-clamp-2">"${client.description}"</p>` : ''}
                        </div>

                        <!-- Testimonial Section with Layout Protection (Modul 4 - C) -->
                        ${(client.rating && client.rating >= 4 && client.testimonial_text) ? `
                            <div class="mt-6 pt-4 border-t border-slate-200/50 text-center flex flex-col items-center justify-center">
                                <div class="flex items-center gap-0.5 text-amber-400 text-sm mb-2 select-none">
                                    ${'★'.repeat(client.rating)}${'☆'.repeat(5 - client.rating)}
                                </div>
                                <div class="w-full min-h-[6.5rem] h-28 overflow-hidden text-slate-600 italic text-[11px] leading-relaxed flex items-center justify-center bg-white border border-slate-100 rounded-xl p-3 shadow-inner">
                                    <p class="line-clamp-3">"${client.testimonial_text}"</p>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(clientEl);

                // Initialize carousel
                initCarousel(carouselId, client.photos.length);
            });

            updatePagination();
        }

        function updatePagination() {
            const clientsWithPhotos = allClients.filter(c => c.photos && c.photos.length > 0);
            const totalPages = Math.ceil(clientsWithPhotos.length / clientsPerPage);
            const controls = document.getElementById('pagination-controls');
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');
            const info = document.getElementById('page-info');

            if (totalPages <= 1) {
                controls.classList.add('hidden');
            } else {
                controls.classList.remove('hidden');
                info.textContent = `Page ${currentPage} of ${totalPages}`;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            }
        }

        // Pagination event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('prev-page')?.addEventListener('click', () => {
                if (currentPage > 1) {
                    renderClientsPage(currentPage - 1);
                    window.scrollTo({ top: document.getElementById('clients-container').offsetTop - 100, behavior: 'smooth' });
                }
            });
            document.getElementById('next-page')?.addEventListener('click', () => {
                const clientsWithPhotos = allClients.filter(c => c.photos && c.photos.length > 0);
                const totalPages = Math.ceil(clientsWithPhotos.length / clientsPerPage);
                if (currentPage < totalPages) {
                    renderClientsPage(currentPage + 1);
                    window.scrollTo({ top: document.getElementById('clients-container').offsetTop - 100, behavior: 'smooth' });
                }
            });
        });

        function formatDate(dateString) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length === 3) {
                const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
                return `${parseInt(parts[2], 10)} ${months[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
            }
            return dateString;
        }

        function initCarousel(id, photoCount) {
            carousels[id] = {
                currentIndex: 0,
                totalPhotos: photoCount,
                autoPlayInterval: null
            };
            updateCarousel(id);
            startAutoPlay(id);
        }

        function updateCarousel(id) {
            const carousel = carousels[id];
            const items = document.querySelectorAll(`#${id} .carousel-item`);
            const dots = document.querySelectorAll(`#${id} .dot`);

            items.forEach((item, idx) => {
                item.classList.toggle('opacity-100', idx === carousel.currentIndex);
                item.classList.toggle('opacity-0', idx !== carousel.currentIndex);
            });

            if (dots.length > 0) {
                dots.forEach((dot, idx) => {
                    dot.classList.toggle('bg-slate-800', idx === carousel.currentIndex);
                    dot.classList.toggle('bg-slate-300', idx !== carousel.currentIndex);
                    dot.classList.remove('bg-white', 'bg-white/50');
                });
            }
        }

        function prevSlide(id) {
            const carousel = carousels[id];
            carousel.currentIndex = (carousel.currentIndex - 1 + carousel.totalPhotos) % carousel.totalPhotos;
            updateCarousel(id);
            resetAutoPlay(id);
        }

        function nextSlide(id) {
            const carousel = carousels[id];
            carousel.currentIndex = (carousel.currentIndex + 1) % carousel.totalPhotos;
            updateCarousel(id);
            resetAutoPlay(id);
        }

        function goToSlide(id, index) {
            carousels[id].currentIndex = index;
            updateCarousel(id);
            resetAutoPlay(id);
        }

        function startAutoPlay(id) {
            const carousel = carousels[id];
            carousel.autoPlayInterval = setInterval(() => {
                carousel.currentIndex = (carousel.currentIndex + 1) % carousel.totalPhotos;
                updateCarousel(id);
            }, 5000); // Change slide every 5 seconds
        }

        function resetAutoPlay(id) {
            clearInterval(carousels[id].autoPlayInterval);
            startAutoPlay(id);
        }

        loadClients();
    </script>
</body>

</html>
