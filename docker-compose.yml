services:
  app-node:
    build: .
    container_name: sorehari-app
    user: "root"
    restart: always
    env_file:
      - /DATA/AppData/wedding-app/backend/.env
    volumes:
      - /DATA/AppData/wedding-app/backend:/app/backend
      - /mnt/DATA1/wedding_uploads:/app/backend/uploads
      - /app/backend/node_modules
    expose:
      - "3000"
    networks:
      - sorehari-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/check-session"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: sorehari-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - /DATA/AppData/wedding-app/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-node:
        condition: service_healthy
    networks:
      - sorehari-net

networks:
  sorehari-net:
    driver: bridge
